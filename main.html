<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
</head>

<body>
	<!-- the entire body must be written by student -->
   <form>

	   <label for="name">Name</label>
	   <input type="text" id="name" name="name" required>
	   <br>
	   <br>

	   <label for="email">Email</label>
	   <input type="email" id="email" name="emailid" required>
	   <br>
	   <br>

	   <label>Gender</label>
	   <br>
	   <label for="gen_m">Male</label>
	   <input type="radio" id="gen_m" name="gender" required>
	    <label for="gen_f">Female</label>
	   <input type="radio" id="gen_f" name="gender" required>
	   <br>
	   <br>
	   
	   <label for="cars">Car Brand</label>
	   <select id="cars" name="Brand">
		  <option value="" selected disabled>Type or choose brand</option>
		   <option value="BMW">BMW</option>
		    <option value="Audi" >Audi</option>
		     <option value="Benz">Mercedez</option>
	   </select>
	   <br>
	   <br>

	   <label for="carage">Car age</label>
	   <input type="number" id="carage" name="age" required>
	   <br>
	   <br>
	   
	   
	   <label for="dop">Date of Purchase</label>
	   <input type="date" id="dop" name="Purchase date">
	   <br>
	   <br>

	   <label for="password">Password</label>
	   <input type="password" id="password" name="password" required>
	   <br>
	   <br>

	   <button type="submit">Submit</button>

	   
	   
	   
   </form>

	
<script type="text/javascript" src="./script.js">
</script>

</body>

</html>
